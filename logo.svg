<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#0f3460" stroke-width="4"/>
  <!-- iPhone (left) -->
  <rect x="100" y="150" width="90" height="160" rx="12" fill="none" stroke="#eee" stroke-width="6"/>
  <rect x="112" y="168" width="66" height="110" rx="2" fill="#0f3460"/>
  <!-- Photo icon on phone screen -->
  <polygon points="120,260 130,245 140,255 150,235 165,260" fill="#4ecdc4" opacity="0.8"/>
  <circle cx="160" cy="240" r="6" fill="#e94560" opacity="0.8"/>
  <!-- Phone home indicator -->
  <rect x="130" y="294" width="30" height="4" rx="2" fill="#555"/>
  <!-- Desktop monitor (right) -->
  <rect x="290" y="150" width="130" height="100" rx="8" fill="none" stroke="#eee" stroke-width="6"/>
  <rect x="302" y="165" width="106" height="70" rx="2" fill="#0f3460"/>
  <!-- Photos on monitor screen -->
  <rect x="310" y="172" width="30" height="24" rx="2" fill="#4ecdc4" opacity="0.6"/>
  <rect x="345" y="172" width="30" height="24" rx="2" fill="#e94560" opacity="0.6"/>
  <rect x="310" y="200" width="30" height="24" rx="2" fill="#e94560" opacity="0.4"/>
  <rect x="345" y="200" width="30" height="24" rx="2" fill="#4ecdc4" opacity="0.4"/>
  <!-- Monitor stand -->
  <rect x="340" y="250" width="30" height="15" fill="none" stroke="#eee" stroke-width="4"/>
  <rect x="325" y="262" width="60" height="6" rx="3" fill="#eee"/>
  <!-- Connection arrow -->
  <path d="M200 230 L280 230" stroke="#e94560" stroke-width="5" stroke-linecap="round" fill="none"/>
  <polygon points="275,218 295,230 275,242" fill="#e94560"/>
  <!-- Small photos flowing along arrow -->
  <rect x="220" y="220" width="12" height="9" rx="1" fill="#4ecdc4" opacity="0.7" transform="rotate(-5 226 224)"/>
  <rect x="240" y="222" width="12" height="9" rx="1" fill="#eee" opacity="0.5" transform="rotate(3 246 226)"/>
  <!-- Text -->
  <text x="256" y="370" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="42" font-weight="bold" fill="#eee" text-anchor="middle">PhotoFetch</text>
  <text x="256" y="400" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" fill="#4ecdc4" text-anchor="middle" opacity="0.8">iPhone → Computer</text>
</svg>
